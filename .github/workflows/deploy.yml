name: Deploy

# Triggers:
#   push to main   → deploys to staging
#   published release (e.g. v1.2.3) → deploys to production
#
# Railway auto-deploys backend services directly from GitHub — no job needed here.
# This workflow handles Vercel (web) only.

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  # ── Determine target environment ──────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      vercel_flag:  ${{ steps.ctx.outputs.vercel_flag }}
    steps:
      - id: ctx
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "vercel_flag=--prod"     >> $GITHUB_OUTPUT
          else
            echo "environment=staging"   >> $GITHUB_OUTPUT
            echo "vercel_flag="          >> $GITHUB_OUTPUT
          fi

  # ── Deploy Next.js to Vercel ──────────────────────────────────────────────────
  deploy-vercel:
    name: Vercel — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        run: npx vercel deploy ${{ needs.setup.outputs.vercel_flag }} --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Post-deploy health check ──────────────────────────────────────────────────
  smoke-test:
    name: Smoke test — ${{ needs.setup.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [setup, deploy-vercel]
    steps:
      - name: Check web is up
        run: |
          URL="${{ needs.setup.outputs.environment == 'production' && 'https://bobby.gg' || 'https://staging.bobby.gg' }}"
          echo "Checking $URL"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then exit 0; fi
            sleep 10
          done
          echo "Smoke test failed after 5 attempts"
          exit 1
